name: native_udp
description: Native UDP sockets for Flutter. Uses Network.framework on iOS for reliable cellular support. Falls back to Dart's RawDatagramSocket on Android.
version: 0.1.0
repository: https://github.com/unixshells/native_udp

environment:
  sdk: ^3.10.8
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.unixshells.native_udp
        pluginClass: NativeUdpPlugin
      ios:
        pluginClass: NativeUdpPlugin
